<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>انقطع الاتصال</title>
  <style>
    /* ── Median theme variables (required pattern) ── */
    :root             { --background-color: white;   --primary-color: #1C1C1E; }
    [data-theme="dark"]  { --background-color: #121212; --primary-color: #eeeeee; }
    [data-theme="light"] { --background-color: white;   --primary-color: #1C1C1E; }

    /* ── Fixed brand palette (never overridden by theme) ── */
    :root {
      --em:  #10B981;
      --tl:  #14B8A6;
      --eml: #34D399;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--background-color);
      color: var(--primary-color);
      font-family:
        'Noto Sans Arabic', 'Arabic UI Text', 'Geeza Pro', 'Al Nile',
        -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Animated dark-brand gradient overlay (always dark, covers the body bg) ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      animation: bgBreathe 9s ease-in-out infinite;
    }

    @keyframes bgBreathe {
      0%   { background: radial-gradient(ellipse 120% 100% at 50% 60%, #061a30 0%, #050d18 55%, #030a12 100%); }
      30%  { background: radial-gradient(ellipse 120% 100% at 50% 60%, #072a20 0%, #061a30 55%, #030a12 100%); }
      60%  { background: radial-gradient(ellipse 120% 100% at 50% 60%, #061a30 0%, #082618 55%, #030a12 100%); }
      100% { background: radial-gradient(ellipse 120% 100% at 50% 60%, #061a30 0%, #050d18 55%, #030a12 100%); }
    }

    /* ── Subtle grid overlay ── */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Main container (Median required pattern) ── */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 40px;
      animation: fadeScaleIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeScaleIn {
      from { opacity: 0; transform: scale(0.88) translateY(18px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* ── Illustration stage ── */
    .stage {
      position: relative;
      width: min(340px, 92vw);
      height: 220px;
      margin-bottom: 8px;
    }

    /* ── Signal ripple rings ── */
    .ripple-anchor {
      position: absolute;
      top: 52%;
      left: 50%;
      width: 0;
      height: 0;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(16,185,129,0.6);
      animation: ringExpand 2.8s ease-out infinite;
    }
    .ring:nth-child(1) { width:  80px; height:  80px; top: -40px; left: -40px; animation-delay: 0s;   }
    .ring:nth-child(2) { width: 138px; height: 138px; top: -69px; left: -69px; animation-delay: 0.9s; }
    .ring:nth-child(3) { width: 200px; height: 200px; top:-100px; left:-100px; animation-delay: 1.8s; }

    @keyframes ringExpand {
      0%   { opacity: 0.75; transform: scale(0.3); }
      70%  { opacity: 0.18; }
      100% { opacity: 0;    transform: scale(1);   }
    }

    /* ── Floating particles ── */
    .dot {
      position: absolute;
      border-radius: 50%;
      background: var(--em);
      animation: dotFloat linear infinite;
    }
    .dot:nth-child(1) { width:4px; height:4px; left:12%;  bottom:30px; opacity:.65; animation-duration:4.4s; animation-delay:0s;   }
    .dot:nth-child(2) { width:3px; height:3px; left:80%;  bottom:35px; opacity:.4;  animation-duration:5.7s; animation-delay:1.3s; }
    .dot:nth-child(3) { width:5px; height:5px; left:50%;  bottom:25px; opacity:.5;  animation-duration:3.8s; animation-delay:0.7s; }

    @keyframes dotFloat {
      0%   { transform:translateY(0)      scale(1);   opacity:.65; }
      50%  { transform:translateY(-60px)  scale(1.2); opacity:.9;  }
      100% { transform:translateY(-120px) scale(0.4); opacity:0;   }
    }

    /* ── Dotted route track ── */
    .track {
      position: absolute;
      bottom: 44px;
      left: 16px;
      right: 16px;
      height: 3px;
    }
    .track svg { width: 100%; height: 6px; }

    /* ── Ground glow ── */
    .glow {
      position: absolute;
      bottom: 34px;
      left: 0;
      right: 0;
      height: 20px;
      background: radial-gradient(ellipse 55% 100% at 50% 100%, rgba(16,185,129,0.45) 0%, transparent 80%);
      filter: blur(7px);
      animation: glowPulse 1.8s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1;    }
    }

    /* ── Bus wrapper ── */
    .bus-wrap {
      position: absolute;
      bottom: 38px;
      filter: drop-shadow(0 0 10px rgba(16,185,129,0.6));
      animation: busDrive 3.8s ease-in-out infinite alternate;
    }

    @keyframes busDrive {
      0%   { left: 18px;  transform: translateY(0px)   scaleX(1);  }
      40%  { left: 18px;  transform: translateY(-7px)  scaleX(1);  }
      50%  { left: calc(100% - 118px); transform: translateY(-7px)  scaleX(1);  }
      90%  { left: calc(100% - 118px); transform: translateY(-2px)  scaleX(-1); }
      100% { left: 18px;  transform: translateY(0px)   scaleX(-1); }
    }

    /* ── Text section ── */
    .text-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      margin-top: 6px;
    }

    .heading {
      font-size: clamp(1.6rem, 6vw, 2rem);
      font-weight: 700;
      line-height: 1.2;
      background: linear-gradient(90deg, #34D399, #ffffff 50%, #2DD4BF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(16,185,129,0.4));
      animation: fadeScaleIn 0.7s 0.12s cubic-bezier(0.22,1,0.36,1) both;
    }

    .subtext {
      font-size: clamp(0.85rem, 3.5vw, 0.95rem);
      font-weight: 400;
      /* uses --primary-color but tinted for the dark overlay */
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      max-width: 280px;
      animation: fadeScaleIn 0.7s 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Retry button ── */
    .btn {
      margin-top: 30px;
      padding: 15px 48px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #10B981 0%, #14B8A6 100%);
      color: #fff;
      font-family: inherit;
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 22px rgba(16,185,129,0.45), 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      animation:
        fadeScaleIn 0.7s 0.32s cubic-bezier(0.22,1,0.36,1) both,
        btnGlow 2.8s ease-in-out 1.2s infinite;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 18px rgba(16,185,129,0.4),  0 4px 16px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 38px rgba(16,185,129,0.75), 0 4px 20px rgba(0,0,0,0.5); }
    }

    .btn:active { transform: scale(0.93); }

    .btn.loading {
      pointer-events: none;
      opacity: 0.82;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    .btn.loading .spinner  { display: block; }
    .btn.loading .btn-text { opacity: 0.85; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer brand ── */
    .brand {
      margin-top: 36px;
      font-size: 0.7rem;
      letter-spacing: 0.07em;
      color: rgba(255,255,255,0.2);
      animation: fadeScaleIn 0.7s 0.48s cubic-bezier(0.22,1,0.36,1) both;
    }
  </style>
</head>
<body>

  <!-- Animated gradient background -->
  <div class="bg"></div>

  <!-- Main container (Median required pattern) -->
  <div class="container">

    <!-- Illustration stage -->
    <div class="stage">

      <!-- Floating particles -->
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>

      <!-- Signal ripple rings -->
      <div class="ripple-anchor">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>

      <!-- Ground glow -->
      <div class="glow"></div>

      <!-- Dotted route track -->
      <div class="track">
        <svg viewBox="0 0 300 6" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="3" x2="300" y2="3"
            stroke="rgba(16,185,129,0.35)" stroke-width="2.2"
            stroke-dasharray="7,5" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Animated bus SVG -->
      <div class="bus-wrap">
        <svg width="100" height="56" viewBox="0 0 100 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="vg" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#34D399"/>
              <stop offset="100%" stop-color="#0D9488"/>
            </linearGradient>
            <filter id="hl" x="-300%" y="-300%" width="700%" height="700%">
              <feGaussianBlur stdDeviation="2.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Chassis -->
          <rect x="4" y="22" width="92" height="26" rx="5" fill="url(#vg)"/>
          <!-- Cabin -->
          <path d="M 11,22 L 15,7 L 68,7 L 77,14 L 82,22 Z" fill="#2DD4A0"/>
          <!-- Windshield -->
          <path d="M 68,7 L 78,13 L 82,22 L 70,22 Z"
            fill="rgba(190,255,240,0.22)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
          <!-- Windows -->
          <rect x="15" y="10" width="16" height="10" rx="2.5"
            fill="rgba(190,255,240,0.18)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          <rect x="36" y="10" width="16" height="10" rx="2.5"
            fill="rgba(190,255,240,0.18)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          <rect x="56" y="10" width="11" height="10" rx="2.5"
            fill="rgba(190,255,240,0.18)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          <!-- Accent stripe -->
          <line x1="4" y1="33" x2="96" y2="33"
            stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
          <!-- Rear wheel -->
          <circle cx="24" cy="48" r="8"   fill="#0B1E2E"/>
          <circle cx="24" cy="48" r="5.5" fill="#162D40"/>
          <circle cx="24" cy="48" r="2.5" fill="#10B981"/>
          <!-- Front wheel -->
          <circle cx="76" cy="48" r="8"   fill="#0B1E2E"/>
          <circle cx="76" cy="48" r="5.5" fill="#162D40"/>
          <circle cx="76" cy="48" r="2.5" fill="#10B981"/>
          <!-- Headlight glow -->
          <g filter="url(#hl)">
            <ellipse cx="97" cy="30" rx="3.5" ry="5"   fill="#FDE68A" opacity="0.95"/>
            <ellipse cx="99" cy="30" rx="5"   ry="4"   fill="#FCD34D" opacity="0.2"/>
          </g>
        </svg>
      </div>

    </div><!-- /stage -->

    <!-- Text -->
    <div class="text-wrap">
      <h1 class="heading">انقطع الاتصال</h1>
      <p class="subtext">تحقق من اتصالك بالإنترنت لمتابعة رحلتك</p>
    </div>

    <!-- Retry button -->
    <button class="btn" id="retryBtn" onclick="doRetry()">
      <div class="spinner" id="spinner"></div>
      <span class="btn-text">إعادة المحاولة</span>
    </button>

    <!-- Brand footer -->
    <p class="brand">ETUS Khenchela &nbsp;·&nbsp; تنقلي خنشلة</p>

  </div><!-- /container -->

  <script>
    function doRetry() {
      var btn = document.getElementById('retryBtn');
      if (btn.classList.contains('loading')) return;
      btn.classList.add('loading');
      setTimeout(function () { window.location.reload(); }, 950);
    }
  </script>

</body>
</html>
